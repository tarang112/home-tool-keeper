name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm install -g bun
      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Verify GitHub Pages is enabled
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")

          if [ "$status" = "404" ]; then
            echo "GitHub Pages is not enabled for ${GITHUB_REPOSITORY}."
            echo "Open repository Settings → Pages, then set Source to GitHub Actions."
            exit 1
          fi

          if [ "$status" != "200" ]; then
            echo "Unable to verify GitHub Pages configuration. GitHub API returned HTTP $status."
            cat /tmp/pages.json
            exit 1
          fi

      - uses: actions/configure-pages@v6

      - name: Upload build preview artifact
        id: preview-artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-${{ github.event_name }}-${{ github.run_number }}
          path: dist
          if-no-files-found: error

      - name: Add preview link to summary
        run: |
          echo "## Build preview" >> "$GITHUB_STEP_SUMMARY"
          echo "Download and open this build locally before GitHub Pages deploys:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.preview-artifact.outputs.artifact-url }}" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
